version: 1

system:
  id: "phone_messages"
  display_name: "Phone Messages"
  what_it_does: "Reads recent message threads and visible message bodies from the Messages app on a paired iPhone."
  use_cases:
    - "List recent conversations from the Messages app"
    - "Read the latest messages in a selected thread"
    - "Find likely one-time passcodes / authentication codes in recent threads"

capability_groups:
  - id: "read_messages"
    name: "Read messages"
    description: "Inspect threads and message bodies without sending or mutating anything."
    tool_ids:
      - "phone_messages.list_recent_threads"
      - "phone_messages.read_latest_messages"
      - "phone_messages.find_recent_otp"

setup_steps:
  - id: "install_plugin"
    kind: "install"
    label: "Install rzn-phone plugin"
    description: "Install the signed rzn-phone bundle."
  - id: "pair_device"
    kind: "runtime"
    label: "Pair device"
    description: "Connect a trusted iPhone that can be driven through Appium/XCUITest."
  - id: "grant_permissions"
    kind: "runtime"
    label: "Grant Messages and automation permissions"
    description: "Keep the device unlocked and allow the automation stack to inspect the Messages UI."
  - id: "test_connection"
    kind: "connectivity"
    label: "Verify device connection"
    description: "Confirm the worker can create a session and reach the paired iPhone."

context_parameters:
  - id: "device_id"
    label: "Device ID"
    kind: "device_selector"
    required: true
  - id: "thread_id"
    label: "Thread ID"
    kind: "string"
    required: false
  - id: "thread_index"
    label: "Thread index"
    kind: "integer"
    required: false
    default: 0
  - id: "max_threads"
    label: "Max threads"
    kind: "integer"
    required: false
    default: 25
  - id: "max_messages"
    label: "Max messages"
    kind: "integer"
    required: false
    default: 20
  - id: "thread_contains"
    label: "Thread contains"
    kind: "string"
    required: false
  - id: "sender_contains"
    label: "Sender contains"
    kind: "string"
    required: false
  - id: "message_contains"
    label: "Message contains"
    kind: "string"
    required: false
  - id: "code_length"
    label: "Exact code length"
    kind: "integer"
    required: false

quick_starts:
  - id: "list_recent_threads"
    title: "List recent threads"
    description: "Open Messages and extract the visible conversation list with a read-only tool."
    tool_id: "phone_messages.list_recent_threads"
    args:
      maxThreads: 25
    example_path: "examples/phone_messages/list_recent_threads.tool_call.json"
  - id: "read_latest_messages"
    title: "Read latest messages"
    description: "Open a thread and collect the visible message rows without sending anything."
    tool_id: "phone_messages.read_latest_messages"
    args:
      threadIndex: 0
      maxMessages: 20
    example_path: "examples/phone_messages/read_latest_messages.tool_call.json"
  - id: "find_recent_otp"
    title: "Find recent OTP"
    description: "Scan recent threads and rank likely authentication-code candidates."
    tool_id: "phone_messages.find_recent_otp"
    args:
      maxThreads: 5
      maxMessages: 8
    example_path: "examples/phone_messages/find_recent_otp.tool_call.json"

result_handling:
  tools:
    phone_messages.list_recent_threads:
      human_view:
        renderer: "table"
        columns:
          - key: "title"
            label: "Thread"
          - key: "preview"
            label: "Preview"
          - key: "timestamp"
            label: "Updated"
      llm_view:
        include:
          - "threads[].thread_id"
          - "threads[].title"
          - "threads[].preview"
          - "threads[].timestamp"
        max_items: 50
      index_view:
        mode: "records"
        record_type: "message_thread"
        records_path: "threads[]"
        fields:
          external_id: "thread_id"
          title: "title"
          body_text: "preview"
          published_at: "timestamp"
          metadata.position: "position"
        bm25_text:
          template: "{{title}}\n\n{{body_text}}"
        embedding_text:
          template: "{{title}}\n\n{{body_text}}"
      debug_view:
        mode: "raw_json"

    phone_messages.read_latest_messages:
      human_view:
        renderer: "list"
      llm_view:
        include:
          - "thread.thread_id"
          - "thread.title"
          - "messages[].message_id"
          - "messages[].body"
          - "messages[].sender"
          - "messages[].sent_at"
        max_items: 50
      index_view:
        mode: "records"
        record_type: "message"
        records_path: "messages[]"
        fields:
          external_id: "message_id"
          title: "thread_title"
          body_text: "body"
          author: "sender"
          published_at: "sent_at"
          metadata.thread_id: "thread_id"
          metadata.position: "position"
        bm25_text:
          template: "{{title}}\n\n{{body_text}}"
        embedding_text:
          template: "{{body_text}}"
      debug_view:
        mode: "raw_json"

    phone_messages.find_recent_otp:
      human_view:
        renderer: "list"
      llm_view:
        include:
          - "found"
          - "candidateCount"
          - "bestCandidate.code"
          - "bestCandidate.thread_title"
          - "bestCandidate.message_excerpt"
          - "candidates[].code"
          - "candidates[].thread_title"
          - "candidates[].message_excerpt"
          - "candidates[].sender"
          - "candidates[].sent_at"
        max_items: 20
      debug_view:
        mode: "raw_json"
