version: 1

system:
  id: "phone_messages"
  display_name: "Phone Messages"
  what_it_does: "Reads message threads on a paired iPhone and supports approval-gated draft/send flows for SMS or iMessage."
  use_cases:
    - "List recent conversations from the Messages app"
    - "Read the latest messages in a selected thread"
    - "Draft or send a reply after explicit approval"

capability_groups:
  - id: "read_messages"
    name: "Read messages"
    description: "Inspect threads and message bodies without sending or mutating anything."
    tool_ids:
      - "phone_messages.list_recent_threads"
      - "phone_messages.read_latest_messages"

  - id: "send_messages"
    name: "Send messages"
    description: "Draft or send outbound messages. These actions are side-effectful and should stay approval-gated."
    tool_ids:
      - "phone_messages.send_message"

setup_steps:
  - id: "install_plugin"
    kind: "install"
    label: "Install phone automation plugin"
    description: "Install the signed phone automation bundle."
  - id: "pair_device"
    kind: "runtime"
    label: "Pair device"
    description: "Connect a trusted iPhone that can be driven through Appium/XCUITest."
  - id: "grant_permissions"
    kind: "runtime"
    label: "Grant Messages and automation permissions"
    description: "Keep the device unlocked and allow the automation stack to inspect the Messages UI."
  - id: "test_connection"
    kind: "connectivity"
    label: "Verify device connection"
    description: "Confirm the worker can create a session and reach the paired phone."

context_parameters:
  - id: "device_id"
    label: "Device ID"
    kind: "device_selector"
    required: true
  - id: "thread_id"
    label: "Thread ID"
    kind: "string"
    required: false
  - id: "phone_number"
    label: "Phone number"
    kind: "string"
    required: false
  - id: "max_threads"
    label: "Max threads"
    kind: "integer"
    required: false
    default: 25

quick_starts:
  - id: "list_recent_threads"
    title: "List recent threads"
    description: "Open Messages and extract the visible conversation list with a read-only starter script."
    tool_id: "phone_messages.list_recent_threads"
    args:
      max_threads: 25
    example_path: "examples/phone_messages/list_recent_threads.tool_call.json"
  - id: "read_latest_messages"
    title: "Read latest messages"
    description: "Open a thread and collect the visible message rows without sending anything."
    tool_id: "phone_messages.read_latest_messages"
    args:
      thread_index: 0
      max_messages: 20
    example_path: "examples/phone_messages/read_latest_messages.tool_call.json"

result_handling:
  tools:
    phone_messages.list_recent_threads:
      human_view:
        renderer: "table"
        columns:
          - key: "title"
            label: "Thread"
          - key: "preview"
            label: "Preview"
          - key: "timestamp"
            label: "Updated"
      llm_view:
        include:
          - "threads[].thread_id"
          - "threads[].title"
          - "threads[].preview"
          - "threads[].timestamp"
          - "threads[].unread"
        max_items: 50
      index_view:
        mode: "records"
        record_type: "message_thread"
        records_path: "threads[]"
        fields:
          external_id: "thread_id"
          title: "title"
          body_text: "preview"
          published_at: "timestamp"
          metadata.unread: "unread"
          metadata.participants: "participants"
        bm25_text:
          template: "{{title}}\n\n{{body_text}}"
        embedding_text:
          template: "{{title}}\n\n{{body_text}}"
      debug_view:
        mode: "raw_json"

    phone_messages.read_latest_messages:
      human_view:
        renderer: "list"
      llm_view:
        include:
          - "thread.thread_id"
          - "thread.title"
          - "messages[].message_id"
          - "messages[].sender"
          - "messages[].direction"
          - "messages[].body"
          - "messages[].sent_at"
        max_items: 50
      index_view:
        mode: "records"
        record_type: "message"
        records_path: "messages[]"
        fields:
          external_id: "message_id"
          title: "thread_title"
          body_text: "body"
          author: "sender"
          published_at: "sent_at"
          metadata.direction: "direction"
          metadata.thread_id: "thread_id"
        bm25_text:
          template: "{{title}}\n\n{{body_text}}"
        embedding_text:
          template: "{{body_text}}"
      debug_view:
        mode: "raw_json"

    phone_messages.send_message:
      human_view:
        renderer: "summary"
      llm_view:
        include:
          - "status"
          - "thread_id"
          - "recipient"
        max_items: 1
      index_view:
        mode: "none"
      debug_view:
        mode: "raw_json"
