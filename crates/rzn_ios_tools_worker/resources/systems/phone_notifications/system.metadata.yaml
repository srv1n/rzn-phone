version: 1

system:
  id: "phone_notifications"
  display_name: "Phone Notifications"
  what_it_does: "Reads visible Notification Center rows on a paired iPhone and supports app-label filtering without mutating device state."
  use_cases:
    - "List recent notifications visible on the device"
    - "Filter notifications by visible app label"
    - "Inspect notification summaries without indexing transport-only acknowledgements"

capability_groups:
  - id: "read_notifications"
    name: "Read notifications"
    description: "Inspect recent notifications and app-specific notification rows."
    tool_ids:
      - "phone_notifications.list_recent_notifications"
      - "phone_notifications.filter_notifications_by_app"

setup_steps:
  - id: "install_plugin"
    kind: "install"
    label: "Install rzn-phone plugin"
    description: "Install the signed rzn-phone bundle."
  - id: "pair_device"
    kind: "runtime"
    label: "Pair device"
    description: "Connect a trusted iPhone that can be driven through Appium/XCUITest."
  - id: "grant_permissions"
    kind: "runtime"
    label: "Grant notification and automation permissions"
    description: "Keep the device unlocked so Notification Center content can be inspected."
  - id: "test_connection"
    kind: "connectivity"
    label: "Verify device connection"
    description: "Confirm the worker can create a session and reach the paired iPhone."

context_parameters:
  - id: "device_id"
    label: "Device ID"
    kind: "device_selector"
    required: true
  - id: "app_label"
    label: "App label"
    kind: "string"
    required: false
  - id: "max_notifications"
    label: "Max notifications"
    kind: "integer"
    required: false
    default: 25

quick_starts:
  - id: "list_recent_notifications"
    title: "List recent notifications"
    description: "Pull down Notification Center and extract visible rows with a read-only tool."
    tool_id: "phone_notifications.list_recent_notifications"
    args:
      maxNotifications: 25
    example_path: "examples/phone_notifications/list_recent_notifications.tool_call.json"
  - id: "filter_notifications_by_app"
    title: "Filter by app"
    description: "Use the same starter script, then project notifications for one app label."
    tool_id: "phone_notifications.filter_notifications_by_app"
    args:
      appLabel: "Messages"
      maxNotifications: 25
    example_path: "examples/phone_notifications/filter_notifications_by_app.tool_call.json"

result_handling:
  tools:
    phone_notifications.list_recent_notifications:
      human_view:
        renderer: "table"
        columns:
          - key: "app_name"
            label: "App"
          - key: "body"
            label: "Summary"
          - key: "timestamp"
            label: "When"
      llm_view:
        include:
          - "notifications[].notification_id"
          - "notifications[].app_name"
          - "notifications[].body"
          - "notifications[].timestamp"
        max_items: 50
      index_view:
        mode: "records"
        record_type: "notification"
        records_path: "notifications[]"
        fields:
          external_id: "notification_id"
          title: "app_name"
          body_text: "body"
          source_name: "app_name"
          published_at: "timestamp"
          metadata.position: "position"
        bm25_text:
          template: "{{source_name}}\n\n{{body_text}}"
        embedding_text:
          template: "{{source_name}}\n\n{{body_text}}"
      debug_view:
        mode: "raw_json"

    phone_notifications.filter_notifications_by_app:
      human_view:
        renderer: "table"
        columns:
          - key: "app_name"
            label: "App"
          - key: "body"
            label: "Summary"
          - key: "timestamp"
            label: "When"
      llm_view:
        include:
          - "appLabel"
          - "matches[].notification_id"
          - "matches[].app_name"
          - "matches[].body"
          - "matches[].timestamp"
        max_items: 50
      index_view:
        mode: "records"
        record_type: "notification"
        records_path: "matches[]"
        fields:
          external_id: "notification_id"
          title: "app_name"
          body_text: "body"
          source_name: "app_name"
          published_at: "timestamp"
          metadata.position: "position"
        bm25_text:
          template: "{{source_name}}\n\n{{body_text}}"
        embedding_text:
          template: "{{source_name}}\n\n{{body_text}}"
      debug_view:
        mode: "raw_json"
